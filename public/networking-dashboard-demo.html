<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FootIn — Demo dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root{color-scheme:light;--bg:#f7f6f3;--bg2:#ffffff;--card:#ffffff;--card2:#f5f4f1;--line:#e9e7e2;--txt:#1b1b22;--mut:#6c6c77;--accent:#4a72a8;--accentd:#3c5d8a;
--greenbg:#e9f0ea;--green:#4d7a5b;--yellowbg:#f3efe3;--yellow:#8a7a3f;--bluebg:#e7eef7;--blue:#3c5d8a;--orangebg:#f3ece4;--orange:#9a6b45;--redbg:#f6eae8;--red:#c0473f;--purplebg:#efecf4;--purple:#6a5d86;--graybg:#f0efeb;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,Segoe UI,Arial,sans-serif;font-size:14px;line-height:1.45}
header{background:#ffffff;color:var(--txt);padding:20px 24px;border-bottom:1px solid var(--line)}
header h1{margin:0;font-size:20px}
header p{margin:4px 0 0;color:var(--mut);font-size:13px}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px 70px}
nav{display:flex;gap:4px;background:var(--bg2);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5;padding:0 16px;overflow-x:auto}
nav button{border:0;background:none;padding:14px 16px;font-size:14px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap}
nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab{display:none;padding-top:18px}.tab.active{display:block}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:6px 0 18px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.stat .n{font-size:26px;font-weight:700;color:var(--accent)}
.stat .l{font-size:12px;color:var(--mut);margin-top:2px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
.panel h3{margin:0 0 10px;font-size:15px;color:var(--txt)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:760px){.grid2{grid-template-columns:1fr}}
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.filters input,.filters select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:var(--card2);color:var(--txt)}
.filters input{flex:1;min-width:200px}
.row{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.row .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:flex-start}
.row .nm{font-weight:700;font-size:15px}
.row .nm a{color:var(--accent);text-decoration:none}.row .nm a:hover{text-decoration:underline}
.row .sub{color:var(--mut);font-size:13px;margin-top:1px}
.row .meta{font-size:12px;color:var(--mut);margin-top:6px}
.chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;margin-right:4px;color:var(--txt)}
.note{margin-top:8px;background:var(--card2);border:1px dashed var(--line);border-radius:8px;padding:9px 10px;font-size:13px;display:none}
.note.open{display:block}.note small{color:var(--mut)}
.btn{border:1px solid var(--line);background:var(--card2);border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;color:var(--accent);font-weight:600}
.btn:hover{background:#ececf1}
select.status,input.txt{padding:5px 8px;border:1px solid var(--line);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card2);color:var(--txt)}
input.txt{font-weight:400;cursor:text}
.controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ind{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 6px}
a.apply{color:var(--accent);font-weight:600;text-decoration:none;font-size:12px}a.apply:hover{text-decoration:underline}
.stages{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.stage{background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:12px}.stage b{color:var(--accent)}
table.map{width:100%;border-collapse:collapse;font-size:13px}
table.map th,table.map td{border:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}
table.map th{background:var(--accentd);color:#fff}
.callout{background:var(--bluebg);border-left:4px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px}
.bar{height:10px;border-radius:6px;background:#e9e7e2;overflow:hidden;margin-top:6px}.bar>span{display:block;height:100%;background:var(--green)}
.small{font-size:12px;color:var(--mut)}
.chartbox{position:relative;height:240px}
.tl{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.tl .t{min-width:170px;background:var(--card2);border:1px solid var(--line);border-radius:10px;padding:10px}
.tl .t b{color:var(--accent);font-size:12px}
.tl .t div{font-size:12px;color:var(--mut);margin-top:4px}
.mini{font-size:12px;padding:6px 0;border-bottom:1px solid var(--line)}
.mini:last-child{border-bottom:0}
.ring{display:flex;align-items:center;gap:14px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

/* ---- UI polish: more breathing room, clearer hierarchy ---- */
body{font-size:14.5px}
.wrap{max-width:1100px}
nav{box-shadow:0 1px 0 var(--line)}
.tab{padding-top:22px}
.panel{padding:18px 20px;margin-bottom:18px;border-radius:14px}
.panel h3{font-size:14px;letter-spacing:.02em;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.row{padding:14px 16px;margin-bottom:10px;border-radius:12px;transition:border-color .12s}
.row:hover{border-color:var(--accent)}
.row .nm{font-size:14.5px;line-height:1.35}
.row .meta{margin-top:6px;line-height:1.45}
.chip{padding:2px 9px;font-size:10.5px;letter-spacing:.02em}
.filters{gap:10px;margin-bottom:16px;align-items:center}
.filters input,.filters select{padding:9px 11px;border-radius:9px}
.cards{gap:14px;margin-bottom:20px}
.stat{padding:16px;border-radius:14px}
.ind{margin:24px 0 8px;font-size:11px}
.mini{padding:8px 0;font-size:12.5px;line-height:1.45}
.callout{padding:14px 16px;border-radius:10px;line-height:1.55}
.btn{padding:7px 12px;border-radius:8px}
select.status{padding:6px 9px;border-radius:8px}
.tl .t{border-radius:12px;padding:12px 14px}
.grid2{gap:18px}
/* ---- declutter: calmer density, more breathing room ---- */
.wrap{max-width:960px}
.cards{grid-template-columns:repeat(auto-fit,minmax(205px,1fr));gap:16px;margin-bottom:28px}
.stat{padding:18px 18px}
.panel{padding:22px 24px;margin-bottom:24px}
.grid2{gap:24px}
.row{padding:15px 17px;margin-bottom:12px}
.tab{padding-top:28px}
nav button{padding:14px 18px}
.ind{margin:28px 0 10px}
.toolbar{margin-bottom:18px}
.filters{margin-bottom:20px}
</style>
</head>

function extractAI(r){if(r==null)return"";if(typeof r==="string")return r;if(typeof r==="object"){if(typeof r.text==="string")return r.text;if(typeof r.content==="string")return r.content;if(Array.isArray(r.content))return r.content.map(x=>(x&&(x.text||x.value))||"").join("\n");if(typeof r.output==="string")return r.output;if(typeof r.completion==="string")return r.completion;if(typeof r.response==="string")return r.response;if(typeof r.message==="string")return r.message;}return JSON.stringify(r);}
async function aiCall(prompt,data){const full=(data&&data.length)?prompt+"\n\n"+data.join("\n"):prompt;const resp=await fetch("/api/ai",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:full})});if(!resp.ok){let m="request failed";try{const j=await resp.json();if(j&&j.error)m=j.error;}catch(_){}throw new Error(m);}const j=await resp.json();const t=(j&&j.text)||"";if(!t||!t.trim())throw new Error("empty response");return t;}
function workingBox(fp){window._fbPrompt=fp;return `<div class="small">Working - generating your draft. If nothing appears in ~45s, use the button below.</div><div style="margin-top:6px"><button class="btn" onclick="navigator.clipboard.writeText(window._fbPrompt||'').then(()=>{this.textContent='Prompt copied - paste in chat';})">Copy prompt for chat</button></div>`;}
function resBox(t){window._aiLast=t;return `<div class="row"><div style="white-space:pre-wrap;font-size:13px">${esc(t)}</div><div style="margin-top:8px"><button class="btn" onclick="navigator.clipboard.writeText(window._aiLast||'').then(()=>{this.textContent='Copied!';})">Copy</button></div></div>`;}
function mkFallback(fp,e){window._fbPrompt=fp;const m=e&&e.message?e.message:"unavailable";return `<div class="row"><div class="small">In-app AI did not return a draft (${esc(m)}). Click <b>Copy prompt</b>, paste it into your Claude chat here, and it will write it (the prompt already includes your resume).</div><div style="margin-top:8px"><button class="btn" onclick="navigator.clipboard.writeText(window._fbPrompt||'').then(()=>{this.textContent='Prompt copied - paste in chat';})">Copy prompt</button></div></div>`;}
async function composeMsg(){
 const st=document.getElementById("mstatus"),out=document.getElementById("mout");

 let person;
 if(v.startsWith("p:")){const p=DATA.people[v.slice(2)];person=`${p.name}, ${p.title} at ${p.firm}. Shared tie: ${p.angle}.`;}
 else {const c=DATA.conns[v.slice(2)];person=`${c.name}, ${c.title}. They are already a 1st-degree connection of mine. Context: ${c.why}`;}
 st.textContent="Composing..."; out.innerHTML="";
 const prompt=`Write a ${type} from Sample to this person. Sample: State University finance/accounting sophomore (Class of 20XX), interned at Apex Advisory (demo) (public accounting), a business fraternity Treasurer, co-founder of an AI consulting firm (a student venture), living in NYC this summer via a Columbia internship. Be specific, warm, concise, and human - sound like a curious student, not a salesperson. One clear low-friction ask. No buzzwords. PERSON: ${person}`;

}
